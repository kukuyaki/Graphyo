        const defaultGraphTemplate = `import json
import networkx as nx
from collections import deque
from random import sample,choice
def random_graph_generator(node_c=20, edge_c=19):
    nodes = [i+1 for i in range(node_c)]
    
    min_edges = node_c - 1
    max_edges = node_c * (node_c - 1) // 2
    
    if edge_c < min_edges:
        edge_c = min_edges
    elif edge_c > max_edges:
        edge_c = max_edges

    edges = set()
    unvisited = set(nodes)
    visited = set()
    
    start_node = sample(nodes, 1)[0]
    visited.add(start_node)
    unvisited.remove(start_node)
    
    while unvisited:
        u = choice(list(visited))
        v = choice(list(unvisited))
        
        edge = (min(u, v), max(u, v))
        edges.add(edge)
        
        visited.add(v)
        unvisited.remove(v)

    all_possible_edges = []
    for i in range(len(nodes)):
        for j in range(i + 1, len(nodes)):
            candidate = (nodes[i], nodes[j])
            if candidate not in edges:
                all_possible_edges.append(candidate)
                
    remaining_edges_needed = edge_c - len(edges)
    
    if remaining_edges_needed > 0 and all_possible_edges:
        additional_edges = sample(all_possible_edges, remaining_edges_needed)
        edges.update(additional_edges)

    return nodes, list(edges)
def generate_graph_data(node_c=20, edge_c=19):
    G = nx.Graph()
    nodes,edges = random_graph_generator(node_c, edge_c)
    G.add_nodes_from(nodes)
    G.add_edges_from(edges)
    pos = nx.spring_layout(G, seed=42)
    graph_data = {
        "nodes": [
            {
                "id": str(n), 
                "label": f"Node {n}",
                "x": float(pos[n][0]) * 500,
                "y": float(pos[n][1]) * 500
            } for n in G.nodes()
        ],
        "edges": [
            {
                "id": f"{min(u, v)}-{max(u, v)}",
                "from": str(u), 
                "to": str(v)
            } for u, v in G.edges()
        ]
    }
    return json.dumps(graph_data)

generate_graph_data(30,30)`;

        const defaultAlgoTemplate = `import json
import networkx as nx
def run_dfs_and_record(input_json_str):
    graph_data = json.loads(input_json_str)
    G = nx.Graph()
    for node in graph_data["nodes"]:
        G.add_node(int(node["id"]))
    for edge in graph_data["edges"]:
        G.add_edge(int(edge["from"]), int(edge["to"]))

    start_node = 1 if 1 in G.nodes() else sorted(list(G.nodes()))[0]
    visited = set()
    call_stack = []
    dfs_tree_edges = set()
    steps = []

    def record_step(message, active_node=None, active_edge=None):
        node_states = {}
        for n in G.nodes():
            n_str = str(n)
            if n == active_node: node_states[n_str] = "active"
            elif n in call_stack: node_states[n_str] = "queued"
            elif n in visited: node_states[n_str] = "visited"
            else: node_states[n_str] = "unvisited"

        edge_states = {}
        for u, v in G.edges():
            edge_id = f"{min(u, v)}-{max(u, v)}"
            if active_edge and edge_id == f"{min(active_edge)}-{max(active_edge)}": edge_states[edge_id] = "active"
            elif edge_id in dfs_tree_edges: edge_states[edge_id] = "tree"
            else: edge_states[edge_id] = "normal"

        steps.append({
            "step_index": len(steps),
            "message": message,
            "queue": [str(x) for x in call_stack],
            "visited": [str(x) for x in visited],
            "node_states": node_states,
            "edge_states": edge_states
        })

    def dfs_visit(node, parent=None):
        call_stack.append(node)
        record_step(f"進入 [{node}]", active_node=node, active_edge=(parent, node) if parent else None)
        visited.add(node)
        neighbors = sorted(list(G.neighbors(node)))
        for neighbor in neighbors:
            edge_id = f"{min(node, neighbor)}-{max(node, neighbor)}"
            if neighbor not in visited:
                dfs_tree_edges.add(edge_id)
                dfs_visit(neighbor, node)
            elif neighbor != parent:
                record_step(f"已造訪 [{neighbor}]", active_node=node, active_edge=(node, neighbor))
        call_stack.pop()
        record_step(f"回溯 [{node}]", active_node=node)

    dfs_visit(start_node)
    return json.dumps(steps)

run_dfs_and_record(graph_input_json)`;

    <script type="text/javascript">
        let pyodideInstance = null;
        let currentStepsData = null;
        let currentGraphData = null;
        let rawGraphResult = "";
        let rawStepsResult = "";
        let currentStepIdx = 0;
        let isPlaying = false;
        let playInterval = null;
        let playSpeed = 1000;
        let networkInstance = null;
        let nodesDataSet = null;
        let edgesDataSet = null;

        const consoleElem = document.getElementById('python-console');
        const runBtnGraph = document.getElementById('btn-run-graph');
        const runBtnAlgo = document.getElementById('btn-run-algo');
        const editorGraph = document.getElementById('editor-graph');
        const editorAlgo = document.getElementById('editor-algo');

        editorGraph.value = defaultGraphTemplate;
        editorAlgo.value = defaultAlgoTemplate;

        async function initPyodide() {
            try {
                pyodideInstance = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/" });
                await pyodideInstance.loadPackage('networkx');
                document.getElementById('status-text').innerText = "系統已就緒";
                document.getElementById('status-dot').className = "w-2.5 h-2.5 bg-green-500 rounded-full";
                runBtnGraph.disabled = false;
                pyodideInstance.setStdout({ batched: (text) => { consoleElem.innerText += text + '\\n'; consoleElem.scrollTop = consoleElem.scrollHeight; } });
                await executeGraphCode();
                await executeAlgoCode();
            } catch (error) { console.error(error); }
        }

        function updateConsole(text, clear = false) { if (clear) consoleElem.innerText = ""; consoleElem.innerText += text + '\\n'; consoleElem.scrollTop = consoleElem.scrollHeight; }

        function showToast(message) {
            const toast = document.getElementById('toast-container');
            const msgEl = document.getElementById('toast-message');
            msgEl.innerText = message;
            toast.classList.remove('translate-x-80', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-x-0', 'opacity-100');
            setTimeout(() => { toast.classList.add('translate-x-80', 'opacity-0', 'pointer-events-none'); toast.classList.remove('translate-x-0', 'opacity-100'); }, 5000);
        }

        async function executeGraphCode() {
            if (!pyodideInstance) return;
            rawGraphResult = await pyodideInstance.runPythonAsync(editorGraph.value);
            currentGraphData = JSON.parse(rawGraphResult);
            pyodideInstance.globals.set("graph_input_json", rawGraphResult);
            runBtnAlgo.disabled = false;
            document.getElementById('btn-export-graph').disabled = false;
            initNetworkCanvas();
        }

        async function executeAlgoCode() {
            if (!pyodideInstance || !currentGraphData) return;
            rawStepsResult = await pyodideInstance.runPythonAsync(editorAlgo.value);
            currentStepsData = JSON.parse(rawStepsResult);
            document.getElementById('btn-export-steps').disabled = false;
            resetPlaybackControls();
            updateUIForStep(0);
        }

        function initNetworkCanvas() {
            nodesDataSet = new vis.DataSet(currentGraphData.nodes.map(node => ({ ...node, shape: 'dot', size: 12, color: { background: '#cbd5e1', border: '#94a3b8' } })));
            edgesDataSet = new vis.DataSet(currentGraphData.edges.map(edge => ({ ...edge, color: { color: '#475569' }, width: 2 })));
            networkInstance = new vis.Network(document.getElementById('network-canvas'), { nodes: nodesDataSet, edges: edgesDataSet }, { physics: { enabled: false } });
        }

        function updateUIForStep(stepIdx) {
            currentStepIdx = stepIdx;
            const step = currentStepsData[stepIdx];
            const nodeUpdates = Object.entries(step.node_states).map(([id, state]) => ({ id, color: { background: state === 'active' ? '#f97316' : state === 'queued' ? '#fde047' : '#10b981', border: '#000' } }));
            nodesDataSet.update(nodeUpdates);
            document.getElementById('log-message').innerText = step.message;
            document.getElementById('slider-progress').value = stepIdx;
            const qContainer = document.getElementById('queue-container');
            qContainer.innerHTML = step.queue.map(n => `<div class="px-2 py-1 bg-yellow-400 text-slate-950 font-bold rounded">${n}</div>`).join(' → ');
        }

        // --- 新增：匯出與匯入功能 ---
        function downloadJson(filename, content) {
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function handleFileImport(event, callback) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => callback(e.target.result);
            reader.readAsText(file);
        }

        document.getElementById('btn-export-graph').addEventListener('click', () => downloadJson('graph.json', rawGraphResult));
        document.getElementById('btn-import-graph-trigger').addEventListener('click', () => document.getElementById('input-file-graph').click());
        document.getElementById('input-file-graph').addEventListener('change', (e) => handleFileImport(e, (content) => { editorGraph.value = content; updateConsole("✔ 已匯入圖形定義檔案。"); }));

        document.getElementById('btn-export-steps').addEventListener('click', () => downloadJson('steps.json', rawStepsResult));
        document.getElementById('btn-import-steps-trigger').addEventListener('click', () => document.getElementById('input-file-steps').click());
        document.getElementById('input-file-steps').addEventListener('change', (e) => handleFileImport(e, (content) => { 
            currentStepsData = JSON.parse(content); 
            rawStepsResult = content; 
            resetPlaybackControls(); 
            updateUIForStep(0);
            updateConsole("✔ 已匯入演算法步驟 JSON。"); 
        }));

        function resetPlaybackControls() { document.getElementById('slider-progress').max = currentStepsData.length - 1; }
        
        document.getElementById('ctrl-play').addEventListener('click', () => {
            if (isPlaying) { clearInterval(playInterval); isPlaying = false; }
            else { isPlaying = true; playInterval = setInterval(() => { if (currentStepIdx < currentStepsData.length - 1) updateUIForStep(currentStepIdx + 1); }, playSpeed); }
        });

        window.onload = () => { lucide.createIcons(); initPyodide(); };
    </script>
</body>
</html>
