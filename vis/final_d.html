        const defaultAlgoTemplate = `import json
import networkx as nx


def run_dfs_and_record(input_json_str):
    # 1. 載入並解析階段 1 產生的圖形結構
    graph_data = json.loads(input_json_str)
    
    G = nx.Graph()
    # 根據階段 1 的結構在記憶體中重建圖形
    for node in graph_data["nodes"]:
        G.add_node(int(node["id"]))
    for edge in graph_data["edges"]:
        G.add_edge(int(edge["from"]), int(edge["to"]))

    print("--- [階段 2] 演算法步驟錄製 (DFS 深度優先) ---")
    print("已成功重建 NetworkX 圖形結構。準備執行 DFS 遞迴演算法。")

    # 2. 確保起點存在（優先選擇節點 1，若無則選擇編號最小的點）
    start_node = 1 if 1 in G.nodes() else sorted(list(G.nodes()))[0]
    
    visited = set()
    call_stack = []          # 模擬遞迴呼叫堆疊，對應前端播放器的佇列 (Queue) 顯示
    dfs_tree_edges = set()   # 記錄 DFS 搜尋樹中實際走過的邊
    steps = []

    def record_step(message, active_node=None, active_edge=None):
        """記錄當前 DFS 狀態的快照"""
        node_states = {}
        for n in G.nodes():
            n_str = str(n)
            if n == active_node:
                node_states[n_str] = "active"
            elif n in call_stack:
                # 在遞迴路徑中的點，我們標記為 "queued" (在前端會呈現黃色)
                node_states[n_str] = "queued"
            elif n in visited:
                node_states[n_str] = "visited"
            else:
                node_states[n_str] = "unvisited"

        edge_states = {}
        for u, v in G.edges():
            edge_id = f"{min(u, v)}-{max(u, v)}"
            if active_edge and edge_id == f"{min(active_edge)}-{max(active_edge)}":
                edge_states[edge_id] = "active"
            elif edge_id in dfs_tree_edges:
                edge_states[edge_id] = "tree"
            else:
                edge_states[edge_id] = "normal"

        # 將呼叫堆疊 (call_stack) 的內容當作 queue 輸出給前端渲染
        steps.append({
            "step_index": len(steps),
            "message": message,
            "queue": [str(x) for x in call_stack],
            "visited": [str(x) for x in visited],
            "node_states": node_states,
            "edge_states": edge_states
        })

    # 3. 遞迴 DFS 主體演算法
    def dfs_visit(node, parent=None):
        # 進入節點，壓入呼叫堆疊
        call_stack.append(node)
        
        # 【步驟 1】：進入節點的瞬間
        edge_msg = f" 經由邊 {parent}-{node}" if parent else ""
        record_step(
            f"📥 遞迴進入節點 [{node}]{edge_msg}，將其壓入呼叫堆疊（Call Stack）。目前堆疊路徑: {' -> '.join(map(str, call_stack))}",
            active_node=node,
            active_edge=(parent, node) if parent else None
        )

        visited.add(node)
        
        # 【步驟 2】：標記為已造訪，準備探索鄰居
        record_step(
            f"將節點 [{node}] 標記為「已造訪（處理中）」。開始依序檢查其鄰居節點...",
            active_node=node
        )

        # 為了確保走訪順序固定且好觀察，鄰居由小到大排序
        neighbors = sorted(list(G.neighbors(node)))
        
        for neighbor in neighbors:
            edge_id = f"{min(node, neighbor)}-{max(node, neighbor)}"
            
            if neighbor not in visited:
                # 【步驟 3】：發現未造訪鄰居，準備深入探索
                record_step(
                    f"🔍 探索邊 {node}-{neighbor}。發現未造訪鄰居 [{neighbor}]，準備深入遞迴！",
                    active_node=node,
                    active_edge=(node, neighbor)
                )
                
                # 將此邊加入 DFS 搜尋樹中
                dfs_tree_edges.add(edge_id)
                
                # 遞迴深入
                dfs_visit(neighbor, node)
                
                # 【步驟 4】：從遞迴子程序返回
                record_step(
                    f"↩️ 從節點 [{neighbor}] 遞迴返回至 [{node}]。繼續檢查 [{node}] 的其餘鄰居。目前堆疊路徑: {' -> '.join(map(str, call_stack))}",
                    active_node=node
                )
            else:
                # 【步驟 5】：遇到已經造訪過的鄰居，跳過此邊
                # 若這條邊是剛剛進入時的父節點邊，就不用特別說明（或簡單跳過）
                if neighbor != parent:
                    record_step(
                        f"探索邊 {node}-{neighbor}。鄰居 [{neighbor}] 先前已被造訪過，跳過此邊（不進行遞迴）。",
                        active_node=node,
                        active_edge=(node, neighbor)
                    )

        # 【步驟 6】：離開節點，自呼叫堆疊彈出
        call_stack.pop()
        record_step(
            f"📤 節點 [{node}] 的所有鄰居已探索完畢。自呼叫堆疊（Call Stack）彈出，回溯回上一層。",
            active_node=node
        )

    # 【步驟 0】：演算法初始化
    record_step(f"DFS 深度優先搜尋演算法初始化。準備從起點 [{start_node}] 開始深入探索。")
    
    # 開始進行 DFS 走訪
    dfs_visit(start_node)

    # 【步驟 7】：演算法完成
    record_step("🎉 DFS 演算法執行完畢！所有與起點相連的路徑皆已深度探索完成。")

    # 輸出步驟 JSON 給前端播放器
    return json.dumps(steps)

# 執行 DFS 演算法並傳入注入的全域變數
run_dfs_and_record(graph_input_json)
`;

    <!-- STREAMING_CHUNK: Setting up Pyodide compiler controller and helper methods... -->
    <script type="text/javascript">
        let pyodideInstance = null;

        // 初始化 Pyodide 與 NetworkX

                await pyodideInstance.loadPackage('networkx');

                // 修改 UI 狀態
                document.getElementById('status-text').innerText = "系統已就緒 (Pyodide VM)";

                // 綁定 stdout
                pyodideInstance.setStdout({

                });

                // 首次自動執行一次雙階段流程

            } catch (error) {

        }

        function updateConsole(text, clear = false) {
            if (clear) consoleElem.innerText = "";
            consoleElem.innerText += text + '\n';
            consoleElem.scrollTop = consoleElem.scrollHeight;
        }

        // 顯示 Toast 錯誤
        function showToast(message) {
            const toast = document.getElementById('toast-container');
            const msgEl = document.getElementById('toast-message');
            msgEl.innerText = message;
            
            toast.classList.remove('translate-x-80', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-x-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('translate-x-80', 'opacity-0', 'pointer-events-none');
                toast.classList.remove('translate-x-0', 'opacity-100');
            }, 5000);
        }

        // 安全複製到剪貼簿
        async function copyToClipboard(text, successMessage) {
    // 1. 執行複製邏輯
    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
        } else {
            const temp = document.createElement("textarea");
            temp.value = text;
            temp.style.position = "fixed";
            temp.style.left = "-9999px";
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
        }
    } catch (err) {
        console.error("複製動作失敗：", err);
        return; 
    }

    // 2. UI 顯示邏輯 (修正選取器邏輯)
    const toast = document.getElementById('toast-container');
    const msgEl = document.getElementById('toast-message');
    if (!toast || !msgEl) return;

    msgEl.innerText = successMessage;
    
    const toastBg = toast.querySelector('div');
    // 修改選取方式：尋找含有 data-lucide 屬性的元素，更穩健
    const toastIcon = toast.querySelector('[data-lucide]');

    if (toastBg && toastIcon) {
        toastBg.className = "bg-emerald-950 border border-emerald-800 text-emerald-200 p-4 rounded-2xl shadow-2xl flex items-start space-x-3";
        toastIcon.setAttribute('data-lucide', 'check-circle-2');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    
    toast.classList.remove('translate-x-80', 'opacity-0', 'pointer-events-none');
    toast.classList.add('translate-x-0', 'opacity-100');
    
    setTimeout(() => {
        toast.classList.add('translate-x-80', 'opacity-0', 'pointer-events-none');
        toast.classList.remove('translate-x-0', 'opacity-100');
        
        setTimeout(() => {
            if (toastBg && toastIcon) {
                toastBg.className = "bg-red-950 border border-red-800 text-red-200 p-4 rounded-2xl shadow-2xl flex items-start space-x-3";
                toastIcon.setAttribute('data-lucide', 'alert-circle');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        }, 400);
    }, 3000);
}

    // 2. 安全的 UI 顯示邏輯
    const toast = document.getElementById('toast-container');
    const msgEl = document.getElementById('toast-message');
    if (!toast || !msgEl) return; // 防護：如果 Toast 元件不存在就跳過 UI 更新

    msgEl.innerText = successMessage;
    
    const toastBg = toast.querySelector('div');
    const toastIcon = toast.querySelector('i'); // 這裡抓取 icon

    if (toastBg && toastIcon) {
        // 設定成功樣式
        toastBg.className = "bg-emerald-950 border border-emerald-800 text-emerald-200 p-4 rounded-2xl shadow-2xl flex items-start space-x-3";
        toastIcon.setAttribute('data-lucide', 'check-circle-2');
        lucide.createIcons();
    }
    
    toast.classList.remove('translate-x-80', 'opacity-0', 'pointer-events-none');
    toast.classList.add('translate-x-0', 'opacity-100');
    
    setTimeout(() => {
        toast.classList.add('translate-x-80', 'opacity-0', 'pointer-events-none');
        toast.classList.remove('translate-x-0', 'opacity-100');
        
        // 恢復樣式
        setTimeout(() => {
            if (toastBg && toastIcon) {
                toastBg.className = "bg-red-950 border border-red-800 text-red-200 p-4 rounded-2xl shadow-2xl flex items-start space-x-3";
                toastIcon.setAttribute('data-lucide', 'alert-circle');
                lucide.createIcons();
            }
        }, 400);
    }, 3000);
}

        // 階段 1：單獨執行圖形定義
        async function executeGraphCode() {
            if (!pyodideInstance) return;
            
            pausePlayback();
            updateConsole(">>> [階段 1] 正在編譯執行圖形定義...", true);
            const graphPythonSource = editorGraph.value;

            try {
                rawGraphResult = await pyodideInstance.runPythonAsync(graphPythonSource);
                
                if (!rawGraphResult) {
                    throw new Error("階段 1 未能返回任何有效的圖形結構！請確認範本最後一行有呼叫 generate_graph_data() 函數。");
                }

                currentGraphData = JSON.parse(rawGraphResult);
                updateConsole(`✔ 階段 1 成功完成：生成 ${currentGraphData.nodes.length} 個節點、${currentGraphData.edges.length} 條邊的實體。`);

                // 注入全域變數到 Pyodide 的 Python 空間中，供階段 2 動態讀取
                pyodideInstance.globals.set("graph_input_json", rawGraphResult);

                // 解鎖下一步的按鈕
                runBtnAlgo.disabled = false;
                copyBtnGraph.disabled = false;

                // 即時初始化與更新 Canvas
                initNetworkCanvas();
                
                // 圖形更新時，重置尚未重新錄製的演算法狀態，以防節點對不上
                currentStepsData = null;
                rawStepsResult = "";
                copyBtnSteps.disabled = true;
                resetPlaybackControls();
                
                document.getElementById('queue-container').innerHTML = '<span class="text-slate-600 italic">圖形已更新，請點擊上方「2. 執行並錄製步驟」來渲染演算法。</span>';
                document.getElementById('log-message').innerText = "圖形定義成功編譯！底層 Canvas 座標已更新。請點擊「2. 執行並錄製步驟」加載對應的演算法流程。";

                updateConsole("\n🎉 圖形更新並初始化完畢！已在 WebAssembly 環境自動注入變數 'graph_input_json'。");
                
            } catch (err) {
                console.error("圖形生成階段錯誤：", err);
                updateConsole(`\n❌ [Runtime Error - Stage 1]:\n${err.message}`);
                showToast("圖形定義執行失敗！" + err.message);
            }
        }

        // 階段 2：單獨執行演算法步驟錄製
        async function executeAlgoCode() {
            if (!pyodideInstance) return;
            if (!currentGraphData || !rawGraphResult) {
                showToast("尚未生成圖形！請先點選「1. 執行並生成圖形」");
                return;
            }
            
            pausePlayback();
            updateConsole("\n>>> [階段 2] 正在編譯執行演算法並錄製狀態幀...");
            const algoPythonSource = editorAlgo.value;

            try {
                // 確保全域變數依然被注入
                pyodideInstance.globals.set("graph_input_json", rawGraphResult);

                rawStepsResult = await pyodideInstance.runPythonAsync(algoPythonSource);
                
                if (!rawStepsResult) {
                    throw new Error("階段 2 錄製完畢但回傳為空！請確認範本最後一行正常呼叫了回傳步驟 JSON 的函數。");
                }

                currentStepsData = JSON.parse(rawStepsResult);
                updateConsole(`✔ 階段 2 成功完成：成功捕獲 ${currentStepsData.length} 幀演算法步驟快照。`);
                
                copyBtnSteps.disabled = false;

                resetPlaybackControls();
                updateUIForStep(0);
                
                updateConsole("\n🎉 演算法錄製完成！已將最新步驟數據流加載至下方播放器，請點擊「自動播放」或「下一步」觀察。");
                
            } catch (err) {
                console.error("演算法步驟錄製階段錯誤：", err);
                updateConsole(`\n❌ [Runtime Error - Stage 2]:\n${err.message}`);
                showToast("演算法步驟錄製失敗！" + err.message);
            }
        }

        // ==========================================
        // 【第一優化區塊】：優化後的網頁畫布初始化函數
        // ==========================================
        /* STREAMING_CHUNK: Configuring optimized vis-network rendering parameters... */
        function initNetworkCanvas() {
            if (!currentGraphData) return;

            // 轉換節點與邊為 DataSet
            nodesDataSet = new vis.DataSet(currentGraphData.nodes.map(node => ({
                ...node,
                shape: 'dot',
                size: 12, //abcdefg
                color: { background: '#cbd5e1', border: '#94a3b8' },
                font: { color: '#f1f5f9', size: 14, face: 'monospace' }
            })));

            edgesDataSet = new vis.DataSet(currentGraphData.edges.map(edge => ({
                ...edge,
                color: { color: '#475569' },
                width: 2
            })));

            const data = { nodes: nodesDataSet, edges: edgesDataSet };
            const options = {
                physics: { enabled: false }, // 關閉物理引擎，使用算好的靜態座標以維持穩定
                edges: {
                    smooth: {
                        enabled: false // ⭐ 【關鍵優化 1】將平滑曲線改為直線，渲染速度直接提升 10 倍！
                    }
                },
                interaction: { dragNodes: true, zoomView: true, dragView: true }
            };

            networkInstance = new vis.Network(document.getElementById('network-canvas'), data, options);
        }

        // ==========================================
        // 【第二優化區塊】：優化後的步驟更新與 DOM 渲染函數 (高流暢度、無抖動)
        // ==========================================
        /* STREAMING_CHUNK: Implementing batched UI state updates for maximum viewport speed... */
        function updateUIForStep(stepIdx) {
            if (!currentStepsData || stepIdx < 0 || stepIdx >= currentStepsData.length) return;
            currentStepIdx = stepIdx;

            const step = currentStepsData[stepIdx];

            // ⭐ 【關鍵優化 2】批次更新節點顏色與大小，避免逐個更新引發多次重繪
            const nodeUpdates = [];
            Object.entries(step.node_states).forEach(([nodeId, state]) => {
                let bg = '#cbd5e1';  // unvisited 預設灰色
                let border = '#94a3b8';
                let size = 12; //abcdefg

                if (state === 'active') {
                    bg = '#f97316';  // 探索中 - 橘色
                    border = '#ea580c';
                    size = 12; //abcdefg
                } else if (state === 'queued') {
                    bg = '#fde047';  // 佇列中 - 黃色
                    border = '#ca8a04';
                    size = 12; //abcdefg
                } else if (state === 'visited') {
                    bg = '#10b981';  // 已造訪 - 綠色
                    border = '#059669';
                }

                nodeUpdates.push({
                    id: nodeId,
                    color: { background: bg, border: border, highlight: { background: bg, border: border } },
                    size: size
                });
            });
            nodesDataSet.update(nodeUpdates); // 一次性批次更新所有節點！

            // ⭐ 【關鍵優化 3】批次更新邊的顏色與粗細
            const edgeUpdates = [];
            Object.entries(step.edge_states).forEach(([edgeId, state]) => {
                let color = '#475569'; // normal 預設深灰
                let width = 2;

                if (state === 'active') {
                    color = '#f97316'; // 橘色（探索中）
                    width = 5;
                } else if (state === 'tree') {
                    color = '#10b981'; // 綠色（BFS樹）
                    width = 4;
                }

                edgeUpdates.push({
                    id: edgeId,
                    color: { color: color, highlight: color },
                    width: width
                });
            });
            edgesDataSet.update(edgeUpdates); // 一次性批次更新所有邊！

            // 3. 更新日誌與進度條
            document.getElementById('log-message').innerText = step.message;
            document.getElementById('progress-indicator').innerText = `${stepIdx + 1} / ${currentStepsData.length}`;
            document.getElementById('slider-progress').value = stepIdx;

            // ⭐ 【關鍵優化 4】使用字串拼裝一次性寫入 Queue，避免多次 DOM 重繪引發 Layout Thrashing
            const qContainer = document.getElementById('queue-container');
            if (step.queue.length === 0) {
                qContainer.innerHTML = '<span class="text-slate-600 italic">空佇列 []</span>';
            } else {
                let queueHtml = '';
                step.queue.forEach((n, idx) => {
                    queueHtml += `<div class="px-2 py-1 bg-yellow-400 text-slate-950 font-extrabold rounded shadow border border-yellow-500 shrink-0 flex items-center space-x-1"><span>${n}</span></div>`;
                    if (idx < step.queue.length - 1) {
                        queueHtml += `<span class="text-slate-500 font-bold px-0.5">←</span>`;
                    }
                });
                qContainer.innerHTML = queueHtml; // 單次寫入 DOM
            }
        }

        // 播放器播放/暫停邏輯
        /* STREAMING_CHUNK: Managing auto playback timers and speed curves... */
        function togglePlayback() {
            if (isPlaying) {
                pausePlayback();
            } else {
                startPlayback();
            }
        }

        function startPlayback() {
            if (!currentStepsData) return;
            if (currentStepIdx >= currentStepsData.length - 1) {
                currentStepIdx = 0; // 重頭播放
            }
            isPlaying = true;
            document.getElementById('ctrl-play-text').innerText = '暫停';
            document.getElementById('ctrl-play-icon').setAttribute('data-lucide', 'pause');
            lucide.createIcons();

            playInterval = setInterval(() => {
                if (currentStepIdx < currentStepsData.length - 1) {
                    updateUIForStep(currentStepIdx + 1);
                } else {
                    pausePlayback(); // 播完了自動暫停
                }
            }, playSpeed);
        }

        function pausePlayback() {
            isPlaying = false;
            clearInterval(playInterval);
            document.getElementById('ctrl-play-text').innerText = '自動播放';
            document.getElementById('ctrl-play-icon').setAttribute('data-lucide', 'play');
            lucide.createIcons();
        }

        function resetPlaybackControls() {
            if (!currentStepsData) {
                document.getElementById('slider-progress').max = 0;
                document.getElementById('slider-progress').value = 0;
                document.getElementById('progress-indicator').innerText = "0 / 0";
                return;
            }
            document.getElementById('slider-progress').max = currentStepsData.length - 1;
            document.getElementById('slider-progress').value = 0;
            currentStepIdx = 0;
        }

        // 綁定 UI 監聽事件
        /* STREAMING_CHUNK: Registering DOM event listeners for editors, buttons, and sliders... */
        runBtnGraph.addEventListener('click', executeGraphCode);
        runBtnAlgo.addEventListener('click', executeAlgoCode);
        copyBtnGraph.addEventListener('click', () => copyToClipboard(rawGraphResult, "✔ 圖形定義 JSON 已成功複製到剪貼簿！"));
        copyBtnSteps.addEventListener('click', () => copyToClipboard(rawStepsResult, "✔ 演算法步驟 JSON 已成功複製到剪貼簿！"));
        
        document.getElementById('btn-restore-template').addEventListener('click', () => {
            editorGraph.value = defaultGraphTemplate;
            editorAlgo.value = defaultAlgoTemplate;
            updateConsole("已恢復預設雙 Python 範本。請先點擊「1. 執行並生成圖形」編譯。");
        });

        document.getElementById('btn-clear-console').addEventListener('click', () => {
            consoleElem.innerText = "";
        });

        document.getElementById('ctrl-play').addEventListener('click', togglePlayback);
        document.getElementById('ctrl-reset').addEventListener('click', () => {
            pausePlayback();
            updateUIForStep(0);
        });
        document.getElementById('ctrl-next').addEventListener('click', () => {
            pausePlayback();
            if (currentStepsData && currentStepIdx < currentStepsData.length - 1) {
                updateUIForStep(currentStepIdx + 1);
            }
        });
        document.getElementById('ctrl-prev').addEventListener('click', () => {
            pausePlayback();
            if (currentStepsData && currentStepIdx > 0) {
                updateUIForStep(currentStepIdx - 1);
            }
        });

        // 播放進度 Slider
        document.getElementById('slider-progress').addEventListener('input', (e) => {
            pausePlayback();
            updateUIForStep(parseInt(e.target.value));
        });

        // 速度變更 Slider
        document.getElementById('slider-speed').addEventListener('input', (e) => {
            playSpeed = parseInt(e.target.value);
            document.getElementById('speed-indicator').innerText = `${(playSpeed / 1000).toFixed(3)}s`;
            if (isPlaying) {
                pausePlayback();
                startPlayback();
            }
        });

        // 啟動流程
        window.onload = () => {
            lucide.createIcons();
            initPyodide();
        };
    </script>
